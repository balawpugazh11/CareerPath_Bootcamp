<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootcamp Test UI</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    input, button {
      padding: 8px;
      margin: 5px;
    }
    .bootcamp {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>🚀 Bootcamp Test UI</h2>

  <!-- CREATE -->
  <h3>Add Bootcamp</h3>
  <input type="text" id="name" placeholder="Enter bootcamp name">
  <button onclick="addBootcamp()">Add</button>

  <!-- GET -->
  <h3>All Bootcamps</h3>
  <button onclick="getBootcamps()">Refresh</button>

  <div id="list"></div>

  <script>
    const API = "http://localhost:5000/api/bootcamps";

    async function addBootcamp() {
      const name = document.getElementById("name").value;

      await fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
      });

      document.getElementById("name").value = "";
      getBootcamps();
    }

    async function getBootcamps() {
      const res = await fetch(API);
      const data = await res.json();

      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(b => {
        const div = document.createElement("div");
        div.className = "bootcamp";

        div.innerHTML = `
          <b>ID:</b> ${b.id} <br>
          <b>Name:</b> ${b.name} <br>
          <button onclick="deleteBootcamp(${b.id})">Delete</button>
        `;

        list.appendChild(div);
      });
    }

    async function deleteBootcamp(id) {
      await fetch(`${API}/${id}`, {
        method: "DELETE"
      });

      getBootcamps();
    }

    // Load data on start
    getBootcamps();
  </script>

</body>
</html>
